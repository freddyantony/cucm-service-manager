name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Byte-compile
        run: python -m compileall cucm_service.py
      - name: Import smoke test (no network)
        run: python -c "import cucm_service; print('import OK')"
